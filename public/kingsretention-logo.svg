<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D47A1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="crownGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E3F2FD;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0.03" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="roundedRect">
      <rect x="20" y="20" width="360" height="360" rx="80" ry="80"/>
    </clipPath>
  </defs>

  <!-- App icon rounded rectangle background -->
  <rect x="20" y="20" width="360" height="360" rx="80" ry="80" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Subtle inner highlight -->
  <rect x="20" y="20" width="360" height="180" rx="80" ry="80" fill="url(#shieldGrad)" clip-path="url(#roundedRect)"/>

  <!-- Crown -->
  <g filter="url(#glow)" transform="translate(200, 148)">
    <!-- Crown base band -->
    <rect x="-62" y="28" width="124" height="22" rx="4" fill="url(#crownGrad)"/>

    <!-- Crown body -->
    <path d="
      M -62 30
      L -62 -12
      L -38 14
      L 0 -30
      L 38 14
      L 62 -12
      L 62 30
      Z
    " fill="url(#crownGrad)"/>

    <!-- Crown jewels - three circles on points -->
    <circle cx="0" cy="-34" r="9" fill="#FFD700" stroke="white" stroke-width="2"/>
    <circle cx="-62" cy="-14" r="7" fill="#FFD700" stroke="white" stroke-width="1.5"/>
    <circle cx="62" cy="-14" r="7" fill="#FFD700" stroke="white" stroke-width="1.5"/>

    <!-- Small dots on base -->
    <circle cx="-30" cy="39" r="4" fill="#1565C0"/>
    <circle cx="0" cy="39" r="4" fill="#1565C0"/>
    <circle cx="30" cy="39" r="4" fill="#1565C0"/>
  </g>

  <!-- Retention arc / loop symbol below crown -->
  <g transform="translate(200, 240)">
    <!-- Circular retention loop arrow -->
    <path d="M -38 0 A 38 38 0 1 1 20 32" fill="none" stroke="white" stroke-width="11" stroke-linecap="round"/>
    <!-- Arrow head -->
    <polygon points="20,14 38,36 2,40" fill="white"/>
  </g>

  <!-- Brand name text -->
  <text x="200" y="332" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-size="28" font-weight="900" fill="white"
        text-anchor="middle" letter-spacing="1">
    Kings<tspan fill="#FFD700">Retention</tspan>
  </text>
</svg>
